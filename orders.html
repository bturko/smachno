<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Список замовлень | Персонал</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Poppins:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0a0a0b; --charcoal:#151517; --charcoal2:#1c1b1e;
    --gold:#ffc72c; --gold-2:#ffe08a; --red:#da291c; --green:#22c55e;
    --white:#f5f5f3; --grey:#93939a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Montserrat',sans-serif;
    background:linear-gradient(180deg,#0a0a0b,#111113 55%,#0a0a0b);
    color:var(--white); min-height:100vh;
  }
  header{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;justify-content:space-between;
    padding:20px 40px;
    background:rgba(9,9,10,.9);backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,199,44,.2);
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .arches{
    width:46px;height:46px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--gold-2), var(--gold) 60%, #d99a00 100%);
    display:flex;align-items:center;justify-content:center;
    font-family:'Poppins';font-weight:900;color:#3a2600;font-size:22px;
    box-shadow:0 0 22px rgba(255,199,44,.5);
  }
  .brand-title{font-family:'Poppins';font-weight:800;font-size:19px;}
  .brand-title span{color:var(--gold);}
  .brand-sub{color:var(--grey);font-size:12px;text-transform:uppercase;letter-spacing:1px;}
  .stats{display:flex;gap:12px;}
  .stat{
    background:var(--charcoal2);border:1px solid rgba(255,255,255,.08);
    padding:10px 18px;border-radius:14px;text-align:center;min-width:90px;
  }
  .stat b{display:block;font-family:'Poppins';font-weight:800;font-size:20px;color:var(--gold);}
  .stat span{font-size:11px;color:var(--grey);text-transform:uppercase;letter-spacing:.5px;}

  .toolbar{
    display:flex;align-items:center;gap:12px;padding:22px 40px 0;
    flex-wrap:wrap;
  }
  .filter-btn{
    font-family:'Poppins';font-weight:700;font-size:12.5px;
    padding:9px 18px;border-radius:30px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--grey);
    transition:.2s;
  }
  .filter-btn.active{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#3a2600;border-color:transparent;}
  .sync-tag{
    margin-left:auto;font-family:'Poppins';font-size:11px;color:var(--grey);
    display:flex;align-items:center;gap:8px;
  }
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#2ecf71;box-shadow:0 0 8px #2ecf71;animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  main{padding:26px 40px 60px;}
  .order-list{display:flex;flex-direction:column;gap:14px;}
  .order-card{
    background:linear-gradient(150deg,var(--charcoal2),var(--charcoal));
    border:1px solid rgba(255,255,255,.07);border-radius:18px;
    padding:20px 24px;display:grid;grid-template-columns:90px 1fr 200px 160px;
    align-items:center;gap:20px;
    animation:slideIn .4s ease both;
    transition:border-color .2s ease, transform .2s ease;
  }
  .order-card:hover{border-color:rgba(255,199,44,.35);transform:translateY(-2px);}
  @keyframes slideIn{from{opacity:0;transform:translateX(-14px);}to{opacity:1;transform:translateX(0);}}

  .order-num{
    font-family:'Poppins';font-weight:900;font-size:26px;color:var(--gold-2);
    text-align:center;
  }
  .order-num small{display:block;font-size:10px;color:var(--grey);font-weight:600;margin-top:2px;}

  .order-items{font-size:13.5px;color:#d7d7da;line-height:1.6;}
  .order-items b{color:var(--white);}
  .order-time{color:var(--grey);font-size:11.5px;margin-top:4px;}

  .order-total{
    font-family:'Poppins';font-weight:800;font-size:18px;color:var(--gold);text-align:right;
  }
  .order-total .lbl{display:block;font-size:10.5px;color:var(--grey);font-weight:600;margin-bottom:3px;text-transform:uppercase;}

  .status-area{display:flex;flex-direction:column;gap:8px;align-items:flex-end;}
  .status-pill{
    font-family:'Poppins';font-weight:800;font-size:11px;letter-spacing:.5px;
    padding:6px 14px;border-radius:20px;text-transform:uppercase;
  }
  .status-pill.preparing{background:rgba(255,199,44,.15);color:var(--gold-2);border:1px solid rgba(255,199,44,.4);}
  .status-pill.ready{background:rgba(34,197,94,.15);color:#7CFFB2;border:1px solid rgba(34,197,94,.4);}
  .status-pill.completed{background:rgba(255,255,255,.08);color:var(--grey);border:1px solid rgba(255,255,255,.1);}
  .status-btn{
    font-family:'Poppins';font-weight:700;font-size:11.5px;
    background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    color:var(--white);padding:7px 14px;border-radius:20px;cursor:pointer;
    transition:.2s;
  }
  .status-btn:hover{background:linear-gradient(135deg,var(--gold-2),var(--gold));color:#3a2600;border-color:transparent;}

  .empty-state{
    text-align:center;padding:80px 20px;color:var(--grey);
    font-family:'Poppins';font-weight:600;
  }

  @media(max-width:800px){
    .order-card{grid-template-columns:1fr;text-align:left;gap:10px;}
    .order-num{text-align:left;}
    .order-total{text-align:left;}
    .status-area{align-items:flex-start;}
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="arches">С</div>
    <div>
      <div class="brand-title">СМАЧНО · ЗАМОВЛЕННЯ</div>
      <div class="brand-sub">Панель персоналу</div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><b id="statPrep">0</b><span>Готується</span></div>
    <div class="stat"><b id="statReady">0</b><span>Готово</span></div>
    <div class="stat"><b id="statAll">0</b><span>Всього</span></div>
  </div>
</header>

<div class="toolbar">
  <div class="filter-btn active" data-f="all">Усі</div>
  <div class="filter-btn" data-f="preparing">Готується</div>
  <div class="filter-btn" data-f="ready">Готово</div>
  <div class="filter-btn" data-f="completed">Видано</div>
  <div class="sync-tag"><span class="sync-dot"></span><span id="syncLabel">Синхронізація активна</span></div>
</div>

<main>
  <div class="order-list" id="orderList"></div>
</main>

<script>
/* Same shared "file" (localStorage) as menu.html / scoreboard.html.
   Staff can advance an order's status here; the change is written
   back to the shared store and picked up by the other two boards
   within the 10-second poll (or instantly via the storage event). */
const DB_KEY = "mcd_shared_orders_db";
const POLL_MS = 10000;
let currentFilter = "all";

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(!raw) return { nextNumber: 101, orders: [] };
    return JSON.parse(raw);
  }catch(e){ return { nextNumber: 101, orders: [] }; }
}
function saveDB(db){ localStorage.setItem(DB_KEY, JSON.stringify(db)); }

const STATUS_LABEL = { preparing:"Готується", ready:"Готово", completed:"Видано" };
const NEXT_STATUS = { preparing:"ready", ready:"completed" };
const NEXT_LABEL = { preparing:"Позначити готовим", ready:"Видати замовлення" };

function render(){
  const db = loadDB();
  const orders = db.orders;

  document.getElementById("statPrep").textContent = orders.filter(o=>o.status==="preparing").length;
  document.getElementById("statReady").textContent = orders.filter(o=>o.status==="ready").length;
  document.getElementById("statAll").textContent = orders.length;

  const filtered = currentFilter==="all" ? orders : orders.filter(o=>o.status===currentFilter);
  const list = document.getElementById("orderList");

  if(filtered.length===0){
    list.innerHTML = `<div class="empty-state">Замовлень поки немає — оформіть замовлення на екрані меню.</div>`;
    return;
  }

  list.innerHTML = filtered.map((o,i)=>{
    const itemsText = o.items.map(it=>`<b>${it.qty}×</b> ${it.name}`).join(", ");
    const btn = NEXT_STATUS[o.status]
      ? `<button class="status-btn" onclick="advance('${o.id}')">${NEXT_LABEL[o.status]}</button>`
      : "";
    return `
      <div class="order-card" style="animation-delay:${Math.min(i,10)*0.03}s">
        <div class="order-num">#${o.number}<small>№ замовлення</small></div>
        <div>
          <div class="order-items">${itemsText}</div>
          <div class="order-time">Оформлено о ${new Date(o.time).toLocaleTimeString("uk-UA")}</div>
        </div>
        <div class="order-total"><span class="lbl">Сума</span>${o.total} ₴</div>
        <div class="status-area">
          <span class="status-pill ${o.status}">${STATUS_LABEL[o.status]}</span>
          ${btn}
        </div>
      </div>
    `;
  }).join("");
}

function advance(orderId){
  const db = loadDB();
  const order = db.orders.find(o=>o.id===orderId);
  if(order && NEXT_STATUS[order.status]){
    order.status = NEXT_STATUS[order.status];
    saveDB(db);
    render();
  }
}

document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentFilter = btn.dataset.f;
    render();
  });
});

function syncTag(){
  document.getElementById("syncLabel").textContent =
    "Синхронізовано о " + new Date().toLocaleTimeString("uk-UA");
}

setInterval(()=>{ render(); syncTag(); }, POLL_MS);
window.addEventListener("storage", (e)=>{ if(e.key===DB_KEY){ render(); syncTag(); }});

render();
syncTag();
</script>
</body>
</html>
